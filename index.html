<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TRAXION | Sistema Interno</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header class="navbar">
      <div class="logo">TRAXION</div>

      <div class="user-info">
        <span>Ing. Guevara</span>
        <span>Ingeniero de Procesos</span>
        <span>9 Abril 2026</span>
      </div>
    </header>

    <main class="layout-principal">
      <section class="modulos">
        <div class="card">
          <h2>Mantenimiento</h2>

          <nav class="card-menu">
            <a href="preventivo.html">Preventivo</a>
            <a href="correctivo.html">Correctivo</a>
            <a href="piezas.html">Piezas</a>
          </nav>
        </div>

        <div class="card">
          <h2>Taller</h2>

          <nav class="card-menu">
            <a href="presupuestos.html">Presupuestos</a>
            <a href="facturas.html">Facturas</a>
          </nav>
        </div>

        <div class="card">
          <h2>Operaciones</h2>

          <nav class="card-menu">
            <a href="operaciones-diarias.html">Operaciones Diarias</a>
            <a href="operaciones-periodicas.html">Operaciones Periódicas</a>
            <a href="otras.html">Otras</a>
          </nav>
        </div>

        <div class="card">
          <h2>Registro de Unidades</h2>

          <nav class="card-menu">
            <a href="registro.html">Acceder</a>
          </nav>
        </div>
      </section>

      <section class="panel-asistente">
        <div class="tarjeta">
          <h1>Asistente Predictivo de Flota</h1>

          <div class="contenido-asistente">
            <div class="semaforo">
              <div class="luz l-roja" id="rojo"></div>
              <div class="luz l-amarilla" id="amarillo"></div>
              <div class="luz l-verde" id="verde"></div>
            </div>

            <form class="form-asistente">
              <label>Kilometraje desde último mantenimiento</label>
              <input type="number" id="km" placeholder="Ingrese kilometraje" />

              <label>¿Hay código de falla?</label>
              <select id="falla">
                <option value="no">No</option>
                <option value="si">Sí</option>
              </select>

              <label>Tipo de falla</label>
              <select>
                <option>Ninguna</option>
                <option>Motor</option>
                <option>Frenos</option>
              </select>

              <label>Temperatura alta</label>
              <select>
                <option>No</option>
                <option>Sí</option>
              </select>

              <button
                type="button"
                class="btn-evaluar"
                onclick="evaluarUnidad()"
              >
                Evaluar Unidad
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <script>
      function evaluarUnidad() {
        let km = document.getElementById("km").value;
        let falla = document.getElementById("falla").value;

        let rojo = document.getElementById("rojo");
        let amarillo = document.getElementById("amarillo");
        let verde = document.getElementById("verde");

        rojo.style.background = "#444";
        amarillo.style.background = "#444";
        verde.style.background = "#444";

        if (falla === "si" || km > 30000) {
          rojo.style.background = "red";
        } else if (km >= 20000) {
          amarillo.style.background = "yellow";
        } else {
          verde.style.background = "lime";
        }
      }
    </script>
  </body>
</html>
